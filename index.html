<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Práctica Google Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Analytics (reemplaza G-XXXXXXXXXX con tu ID) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h1>Práctica de Google Analytics</h1>

  <div class="card">
    <p>Haz clic en los botones para generar eventos</p>

    <button onclick="trackClick('boton_1')">Botón 1</button>
    <button onclick="trackClick('boton_2')">Botón 2</button>
    <button onclick="trackClick('boton_compra')">Simular compra</button>
  </div>

  <div class="card">
    <p>Enlace de prueba</p>
    <a href="https://google.com" target="_blank" onclick="trackLink()">Ir a Google</a>
  </div>

  <script>
    function trackClick(nombre) {
      gtag('event', 'click_boton', {
        'event_category': 'interaccion',
        'event_label': nombre
      });
      alert('Evento enviado: ' + nombre);
    }

    function trackLink() {
      gtag('event', 'click_link', {
        'event_category': 'salida',
        'event_label': 'google'
      });
    }
  </script>

</body>
</html>
